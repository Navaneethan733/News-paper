<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | STACKLY - Truth. Depth. Integrity.</title>
    <meta name="description" content="Login to your STACKLY account to access premium journalism, personalized news feeds, and exclusive newsletters." />
    <link rel="icon" type="image/webp" href="images/favicon.webp" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body style="background: var(--off-white);">
    <!-- ===== SIMPLE AUTH HEADER ===== -->
    <header class="site-header" style="position: static; border-bottom: 1px solid var(--border); box-shadow: none;">
      <div class="container" style="padding: 20px; text-align: center;">
        <div class="logo-wrap">
          <a href="index.html">
            <div class="logo-text" style="font-size: 2.2rem;">STACK<span>LY</span></div>
            <div class="logo-tagline" style="font-size: 0.75rem;">Truth. Depth. Integrity.</div>
          </a>
        </div>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-container reveal visible">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Sign in to continue reading your favorite stories</p>
        </div>

        <form id="loginForm" class="auth-form" onsubmit="return false;">
          <div class="form-group">
            <label for="account-type">Account Type</label>
            <select id="account-type" class="form-control" required>
              <option value="" disabled selected>Select Account Type</option>
              <option value="admin">Admin</option>
              <option value="user">User</option>
            </select>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>

          <div class="form-options">
            <label class="checkbox-group">
              <input type="checkbox"> <span>Remember me</span>
            </label>
            <a href="#" class="forgot-pass">Forgot Password?</a>
          </div>

          <button type="submit" class="btn-auth">Login to Account</button>

          <div class="auth-divider">
            <span>OR CONTINUE WITH</span>
          </div>

          <div class="social-auth">
            <button type="button" class="btn-social">
              <i class="fab fa-google" style="color: #4285F4;"></i> Google
            </button>
            <button type="button" class="btn-social">
              <i class="fab fa-apple" style="color: #000;"></i> Apple
            </button>
          </div>
        </form>

        <div class="auth-footer">
          New to STACKLY? <a href="signup.html">Create an account</a>
        </div>
      </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
      <div class="container">
        <div class="footer-bottom" style="margin-top: 0; padding-top: 30px; border-top: none;">
          <p class="footer-bottom-text">
            &copy; 2026 STACKLY Media Pvt. Ltd. All rights reserved.
          </p>
          <div class="footer-bottom-links">
            <a href="index.html">Home</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Use</a>
            <a href="contact.html">Help Center</a>
          </div>
        </div>
      </div>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | STACKLY - Truth. Depth. Integrity.</title>
    <meta name="description" content="Join STACKLY today to access world-class journalism, personalized news feeds, and exclusive member benefits." />
    <link rel="icon" type="image/webp" href="images/favicon.webp" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body style="background: var(--off-white);">
    
    <header class="site-header" style="position: static; border-bottom: 1px solid var(--border); box-shadow: none;">
      <div class="container" style="padding: 20px; text-align: center;">
        <div class="logo-wrap">
          <a href="index.html">
            <div class="logo-text" style="font-size: 2.2rem;">STACK<span>LY</span></div>
            <div class="logo-tagline" style="font-size: 0.75rem;">Truth. Depth. Integrity.</div>
          </a>
        </div>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-container reveal visible">
        <div class="auth-header">
          <h2>Create Account</h2>
          <p>Join our community of over 2 Million readers</p>
        </div>

        <form class="auth-form" onsubmit="return false;">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Minimum 8 characters" required>
          </div>

          <div class="form-options">
            <label class="checkbox-group">
              <input type="checkbox" required> <span>I agree to the <a href="#" style="color: var(--red);">Terms of Service</a></span>
            </label>
          </div>

          <button type="submit" class="btn-auth">Create Account</button>

          <div class="auth-divider">
            <span>OR SIGN UP WITH</span>
          </div>

          <div class="social-auth">
            <button type="button" class="btn-social">
              <i class="fab fa-google" style="color: #4285F4;"></i> Google
            </button>
            <button type="button" class="btn-social">
              <i class="fab fa-apple" style="color: #000;"></i> Apple
            </button>
          </div>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in here</a>
        </div>
      </div>
    </main>

    
    <footer class="site-footer">
      <div class="container">
        <div class="footer-bottom" style="margin-top: 0; padding-top: 30px; border-top: none;">
          <p class="footer-bottom-text">
            &copy; 2026 STACKLY Media Pvt. Ltd. All rights reserved.
          </p>
          <div class="footer-bottom-links">
            <a href="index.html">Home</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Use</a>
            <a href="contact.html">Help Center</a>
          </div>
        </div>
      </div>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
